<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANIMEX — Trending Now</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24;
      --accent: #e8365d; --accent2: #ff6b35; --gold: #f5c842;
      --text: #f0eeff; --muted: #6b6b8a; --border: rgba(255,255,255,0.07);
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    @keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{opacity:0;transform:translateY(32px) scale(0.97)} to{opacity:1;transform:none} }
    ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}

    /* HEADER */
    header { position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between; }
    .logo { font-family:'Bebas Neue',cursive;font-size:2rem;letter-spacing:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
    .logo span { -webkit-text-fill-color:var(--text); }
    nav { display:flex;gap:2px; }
    .nav-btn { background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:8px 16px;transition:color 0.2s; }
    .nav-btn:hover { color:var(--text); }
    .nav-btn.active { color:var(--accent);border-bottom-color:var(--accent); }

    /* HERO */
    .hero { padding:60px 40px 28px;position:relative;overflow:hidden; }
    .hero-bg { position:absolute;right:-20px;top:0;font-family:'Bebas Neue',cursive;font-size:9rem;color:rgba(255,255,255,0.018);pointer-events:none;user-select:none;letter-spacing:12px;line-height:1; }
    .hero h1 { font-family:'Bebas Neue',cursive;font-size:clamp(3rem,8vw,6.5rem);line-height:0.9;letter-spacing:2px;margin-bottom:14px; }
    .hero h1 em { font-style:normal;-webkit-text-stroke:2px var(--accent);color:transparent; }
    .hero p { color:var(--muted);font-size:0.9rem;font-weight:300; }

    /* CONTROLS */
    .controls { padding:0 40px 32px;display:flex;gap:16px;flex-wrap:wrap;align-items:center; }
    .search-wrap { position:relative;min-width:260px;max-width:460px;flex:1; }
    .search-wrap svg { position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none; }
    #searchInput { width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:11px 16px 11px 42px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;caret-color:var(--accent); }
    #searchInput::placeholder { color:var(--muted); }
    #searchInput:focus { border-color:var(--accent); }
    .genre-pills { display:flex;gap:8px;flex-wrap:wrap; }
    .pill { background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:100px;font-size:0.77rem;font-weight:500;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;font-family:'DM Sans',sans-serif; }
    .pill:hover { border-color:var(--accent);color:var(--text); }
    .pill.active { background:var(--accent);border-color:var(--accent);color:white; }

    /* GRID */
    .grid-wrap { padding:0 40px 80px; }
    #grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:22px; }

    /* CARD */
    .card { border-radius:16px;overflow:hidden;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s,border-color 0.3s;animation:fadeUp 0.45s ease both; }
    .card:hover { transform:translateY(-8px) scale(1.02);box-shadow:0 24px 60px rgba(0,0,0,0.5),0 0 0 1px var(--accent);border-color:var(--accent); }
    .card:hover .card-img { transform:scale(1.07); }
    .card-img-wrap { position:relative;aspect-ratio:2/3;overflow:hidden;background:#1a1a24; }
    .card-img { width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.5s; }
    .card-no-img { width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem; }
    .rank-badge { position:absolute;top:10px;left:10px;font-family:'Bebas Neue',cursive;font-size:1.5rem;line-height:1;color:white;background:var(--accent);padding:4px 10px;border-radius:8px;z-index:2; }
    .rank-badge.top3 { background:var(--gold);color:#111; }
    .score-badge { position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);border:1px solid rgba(245,200,66,0.4);color:var(--gold);padding:4px 10px;border-radius:100px;font-size:0.78rem;font-weight:500;z-index:2; }
    .card-gradient { position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(to top,rgba(0,0,0,0.95),transparent);z-index:1; }
    .card-body { padding:12px 14px; }
    .card-title { font-weight:500;font-size:0.88rem;line-height:1.3;margin-bottom:8px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical; }
    .card-meta { display:flex;gap:6px;flex-wrap:wrap; }
    .tag { padding:3px 8px;border-radius:6px;font-size:0.7rem; }
    .tag-accent { background:rgba(232,54,93,0.12);color:var(--accent); }
    .tag-muted { background:var(--surface2);color:var(--muted); }

    /* SKELETON */
    .skel { border-radius:16px;overflow:hidden;background:var(--surface);border:1px solid var(--border); }
    .skel-img { aspect-ratio:2/3;background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite; }
    .skel-line { height:14px;border-radius:4px;margin:14px 14px 8px;background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite; }
    .skel-line.s { width:60%;height:10px;margin-top:0; }

    /* EMPTY / ERROR */
    .empty { grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted); }
    .empty .icon { font-size:3.5rem;display:block;margin-bottom:16px; }
    .empty h3 { font-family:'Bebas Neue',cursive;font-size:2rem;letter-spacing:2px;color:var(--text);margin-bottom:8px; }
    .retry-btn { margin-top:16px;background:var(--accent);border:none;color:white;padding:10px 28px;border-radius:100px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.88rem; }
    .countdown { font-family:'Bebas Neue',cursive;font-size:3rem;color:var(--accent);display:block;margin:8px 0; }

    /* LOAD MORE */
    #loadMoreWrap { text-align:center;margin-top:52px;display:none; }
    #loadMoreBtn { background:transparent;border:2px solid var(--accent);color:var(--accent);padding:13px 48px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.3s; }
    #loadMoreBtn:hover { background:var(--accent);color:white;box-shadow:0 0 30px rgba(232,54,93,0.4); }

    /* MODAL */
    #modalBackdrop { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);backdrop-filter:blur(16px);z-index:200;align-items:center;justify-content:center;padding:24px;animation:fadeIn 0.2s ease; }
    #modalBackdrop.open { display:flex; }
    .modal { background:var(--surface);border:1px solid rgba(255,255,255,0.08);border-radius:24px;max-width:800px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    .modal-inner { display:grid;grid-template-columns:200px 1fr; }
    .modal-poster-wrap { padding:24px 0 24px 24px; }
    .modal-poster { width:100%;height:290px;object-fit:cover;display:block;border-radius:16px;border:2px solid rgba(255,255,255,0.08);box-shadow:0 8px 32px rgba(0,0,0,0.6); }
    .modal-no-poster { width:100%;height:290px;background:var(--surface2);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:3rem; }
    .modal-body { padding:24px 28px 28px;display:flex;flex-direction:column;gap:14px; }
    .modal-close { position:absolute;top:16px;right:16px;width:36px;height:36px;background:rgba(26,26,36,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:50%;color:var(--text);cursor:pointer;font-size:1rem;z-index:10;display:flex;align-items:center;justify-content:center;transition:background 0.2s; }
    .modal-close:hover { background:var(--accent); }
    .modal-title { font-family:'Bebas Neue',cursive;font-size:1.9rem;letter-spacing:1px;line-height:1.1; }
    .modal-romaji { color:var(--muted);font-size:0.8rem; }
    .modal-genres { display:flex;gap:6px;flex-wrap:wrap; }
    .genre-pill { background:rgba(232,54,93,0.12);border:1px solid rgba(232,54,93,0.25);color:var(--accent);padding:3px 12px;border-radius:100px;font-size:0.71rem; }
    .modal-stats { display:grid;grid-template-columns:repeat(3,1fr);gap:10px; }
    .stat-box { background:var(--surface2);border-radius:12px;padding:10px 12px;text-align:center; }
    .stat-val { font-family:'Bebas Neue',cursive;font-size:1.4rem;letter-spacing:1px;line-height:1; }
    .stat-gold { color:var(--gold); }
    .stat-red  { color:var(--accent); }
    .stat-label { font-size:0.65rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px; }
    .synopsis { color:#8888aa;font-size:0.84rem;line-height:1.75;font-weight:300; }
    .synopsis.collapsed { overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical; }
    .read-more { background:none;border:none;color:var(--accent);cursor:pointer;font-size:0.8rem;padding:0;margin-top:6px;font-family:'DM Sans',sans-serif; }
    .modal-meta { display:flex;gap:6px;flex-wrap:wrap; }

    @media(max-width:640px){
      header { padding:0 16px; }
      .nav-btn { padding:8px 8px;font-size:0.68rem; }
      .hero,.controls,.grid-wrap { padding-left:16px;padding-right:16px; }
      .modal-inner { grid-template-columns:1fr; }
      .modal-poster-wrap { padding:24px 24px 0; }
      .modal-poster,.modal-no-poster { height:220px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">ANIME<span>X</span></div>
  <nav>
    <button class="nav-btn active" data-tab="trending">🔥 Trending</button>
    <button class="nav-btn" data-tab="top">⭐ Top Rated</button>
    <button class="nav-btn" data-tab="airing">📡 Airing</button>
    <button class="nav-btn" data-tab="upcoming">🗓 Upcoming</button>
  </nav>
</header>

<section class="hero">
  <div class="hero-bg">TRENDING</div>
  <h1>What's <em>Hot</em><br>Right Now</h1>
  <p>Live rankings from MyAnimeList via Jikan · Updated daily</p>
</section>

<div class="controls">
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="searchInput" type="text" placeholder="Search anime..." autocomplete="off" />
  </div>
  <div class="genre-pills" id="genrePills">
    <button class="pill active" data-genre="All">All</button>
    <button class="pill" data-genre="Action">Action</button>
    <button class="pill" data-genre="Romance">Romance</button>
    <button class="pill" data-genre="Fantasy">Fantasy</button>
    <button class="pill" data-genre="Comedy">Comedy</button>
    <button class="pill" data-genre="Drama">Drama</button>
    <button class="pill" data-genre="Sci-Fi">Sci-Fi</button>
    <button class="pill" data-genre="Horror">Horror</button>
    <button class="pill" data-genre="Sports">Sports</button>
    <button class="pill" data-genre="Mystery">Mystery</button>
    <button class="pill" data-genre="Slice of Life">Slice of Life</button>
    <button class="pill" data-genre="Supernatural">Supernatural</button>
  </div>
</div>

<div class="grid-wrap">
  <div id="grid"></div>
  <div id="loadMoreWrap"><button id="loadMoreBtn">Load More</button></div>
</div>

<!-- MODAL -->
<div id="modalBackdrop">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-inner">
      <div class="modal-poster-wrap">
        <div id="modalPosterEl"></div>
      </div>
      <div class="modal-body">
        <div class="modal-title" id="mTitle"></div>
        <div class="modal-romaji" id="mRomaji"></div>
        <div class="modal-genres" id="mGenres"></div>
        <div class="modal-stats">
          <div class="stat-box"><div class="stat-val stat-gold" id="mScore">—</div><div class="stat-label">Score</div></div>
          <div class="stat-box"><div class="stat-val stat-red"  id="mEps">—</div><div class="stat-label">Episodes</div></div>
          <div class="stat-box"><div class="stat-val stat-red"  id="mRank">—</div><div class="stat-label">Rank</div></div>
        </div>
        <div>
          <p class="synopsis collapsed" id="mSynopsis"></p>
          <button class="read-more" id="readMoreBtn">Read more ↓</button>
        </div>
        <div class="modal-meta" id="mMeta"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const JIKAN = "https://api.jikan.moe/v4";
  const TAB_URLS = {
    trending: "/top/anime?filter=bypopularity",
    top:      "/top/anime?order_by=score&sort=desc",
    airing:   "/top/anime?filter=airing",
    upcoming: "/top/anime?filter=upcoming",
  };

  let state = {
    tab: "trending",
    genre: "All",
    search: "",
    page: 1,
    list: [],
    hasMore: false,
    loading: false,
  };

  let countdownTimer = null;
  let searchTimer = null;

  // ── FETCH with auto retry on 429 ──
  async function jikanFetch(url, retries = 4) {
    for (let i = 0; i < retries; i++) {
      const res = await fetch(JIKAN + url);
      if (res.status === 429) {
        await new Promise(r => setTimeout(r, 1000 * (i + 1)));
        continue;
      }
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    }
    throw new Error("rate_limited");
  }

  // ── RENDER SKELETONS ──
  function showSkeletons() {
    const grid = document.getElementById("grid");
    grid.innerHTML = Array(16).fill(0).map(() => `
      <div class="skel">
        <div class="skel-img"></div>
        <div class="skel-line"></div>
        <div class="skel-line s"></div>
      </div>
    `).join("");
    document.getElementById("loadMoreWrap").style.display = "none";
  }

  // ── RENDER GRID ──
  function renderGrid() {
    const grid = document.getElementById("grid");
    const filtered = state.genre === "All"
      ? state.list
      : state.list.filter(a => a.genres?.some(g => g.name === state.genre));

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty"><span class="icon">🎌</span><h3>No Results</h3><p>Try a different filter.</p></div>`;
      document.getElementById("loadMoreWrap").style.display = "none";
      return;
    }

    grid.innerHTML = filtered.map((a, i) => {
      const title = a.title_english || a.title || "Unknown";
      const img   = a.images?.webp?.large_image_url || a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || "";
      const score = a.score ? a.score.toFixed(1) : "N/A";
      const eps   = a.episodes ? a.episodes + " eps" : "Ongoing";
      const rank  = i + 1;
      const delay = (i % 20) * 0.035;
      return `
        <div class="card" data-id="${a.mal_id}" style="animation-delay:${delay}s">
          <div class="card-img-wrap">
            ${img
              ? `<img class="card-img" src="${img}" alt="" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
              : ""}
            <div class="card-no-img" style="${img ? "display:none" : ""}">🎌</div>
            <div class="rank-badge ${rank <= 3 ? "top3" : ""}">#${rank}</div>
            <div class="score-badge">★ ${score}</div>
            <div class="card-gradient"></div>
          </div>
          <div class="card-body">
            <div class="card-title">${title}</div>
            <div class="card-meta">
              <span class="tag tag-accent">${a.type || "TV"}</span>
              <span class="tag tag-muted">${eps}</span>
            </div>
          </div>
        </div>`;
    }).join("");

    // click handlers
    grid.querySelectorAll(".card").forEach(card => {
      card.addEventListener("click", () => {
        const id = card.dataset.id;
        const anime = state.list.find(a => String(a.mal_id) === id);
        if (anime) openModal(anime);
      });
    });

    const lmw = document.getElementById("loadMoreWrap");
    lmw.style.display = (!state.search && state.hasMore) ? "block" : "none";
  }

  // ── LOAD DATA ──
  async function load(append = false) {
    if (state.loading) return;
    state.loading = true;

    if (!append) showSkeletons();

    try {
      let json;
      if (state.search) {
        json = await jikanFetch(`/anime?q=${encodeURIComponent(state.search)}&limit=20&page=${state.page}`);
      } else {
        json = await jikanFetch(`${TAB_URLS[state.tab]}&limit=20&page=${state.page}`);
      }
      const items = json.data || [];
      state.list = append ? [...state.list, ...items] : items;
      state.hasMore = json.pagination?.has_next_page ?? (items.length === 20);
      renderGrid();
    } catch(e) {
      if (e.message === "rate_limited") {
        showCountdown(5);
      } else {
        document.getElementById("grid").innerHTML = `
          <div class="empty">
            <span class="icon">⚠️</span>
            <h3>Failed to Load</h3>
            <p>Could not reach the Jikan API.</p>
            <small style="color:#444;display:block;margin-top:6px">${e.message}</small>
            <button class="retry-btn" onclick="reloadCurrent()">Retry</button>
          </div>`;
        document.getElementById("loadMoreWrap").style.display = "none";
      }
    }
    state.loading = false;
  }

  // ── COUNTDOWN on rate limit ──
  function showCountdown(secs) {
    const grid = document.getElementById("grid");
    grid.innerHTML = `
      <div class="empty">
        <span class="icon">⏳</span>
        <h3>Rate Limited</h3>
        <p>Jikan is busy. Auto-retrying in...</p>
        <span class="countdown" id="cdNum">${secs}</span>
      </div>`;
    document.getElementById("loadMoreWrap").style.display = "none";
    clearInterval(countdownTimer);
    let s = secs;
    countdownTimer = setInterval(() => {
      s--;
      const el = document.getElementById("cdNum");
      if (el) el.textContent = s + "s";
      if (s <= 0) {
        clearInterval(countdownTimer);
        load(false);
      }
    }, 1000);
  }

  function reloadCurrent() { load(false); }

  // ── MODAL ──
  function openModal(anime) {
    const title   = anime.title_english || anime.title || "Unknown";
    const img     = anime.images?.webp?.large_image_url || anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || "";
    const synopsis = anime.synopsis || "No synopsis available.";
    const studio  = anime.studios?.[0]?.name;
    const season  = anime.season && anime.year ? `${anime.season.charAt(0).toUpperCase()+anime.season.slice(1)} ${anime.year}` : (anime.year || null);

    document.getElementById("mTitle").textContent = title;
    const romEl = document.getElementById("mRomaji");
    romEl.textContent = (anime.title_english && anime.title && anime.title_english !== anime.title) ? anime.title : "";
    romEl.style.display = romEl.textContent ? "block" : "none";

    document.getElementById("mScore").textContent = anime.score ? anime.score.toFixed(1) : "N/A";
    document.getElementById("mEps").textContent   = anime.episodes || "?";
    document.getElementById("mRank").textContent  = anime.rank ? "#" + anime.rank : "—";

    document.getElementById("mGenres").innerHTML = (anime.genres || []).slice(0,6)
      .map(g => `<span class="genre-pill">${g.name}</span>`).join("");

    const syn = document.getElementById("mSynopsis");
    syn.textContent = synopsis;
    syn.classList.add("collapsed");
    document.getElementById("readMoreBtn").textContent = "Read more ↓";
    document.getElementById("readMoreBtn").style.display = synopsis.length > 250 ? "inline" : "none";

    document.getElementById("mMeta").innerHTML = [anime.status, anime.type, season, studio]
      .filter(Boolean).map(v => `<span class="tag tag-muted">${v}</span>`).join("");

    const posterEl = document.getElementById("modalPosterEl");
    if (img) {
      posterEl.innerHTML = `<img class="modal-poster" src="${img}" alt="" onerror="this.outerHTML='<div class=modal-no-poster>🎌</div>'">`;
    } else {
      posterEl.innerHTML = `<div class="modal-no-poster">🎌</div>`;
    }

    document.getElementById("modalBackdrop").classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeModal() {
    document.getElementById("modalBackdrop").classList.remove("open");
    document.body.style.overflow = "";
  }

  document.getElementById("modalClose").addEventListener("click", closeModal);
  document.getElementById("modalBackdrop").addEventListener("click", e => {
    if (e.target === document.getElementById("modalBackdrop")) closeModal();
  });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  document.getElementById("readMoreBtn").addEventListener("click", function() {
    const syn = document.getElementById("mSynopsis");
    syn.classList.toggle("collapsed");
    this.textContent = syn.classList.contains("collapsed") ? "Read more ↓" : "Read less ↑";
  });

  // ── TABS ──
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      state.tab = btn.dataset.tab;
      state.page = 1;
      state.search = "";
      document.getElementById("searchInput").value = "";
      load(false);
    });
  });

  // ── GENRE PILLS ──
  document.querySelectorAll(".pill").forEach(pill => {
    pill.addEventListener("click", () => {
      document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
      pill.classList.add("active");
      state.genre = pill.dataset.genre;
      renderGrid();
    });
  });

  // ── SEARCH ──
  document.getElementById("searchInput").addEventListener("input", function() {
    clearTimeout(searchTimer);
    const q = this.value.trim();
    state.search = q;
    if (!q) { state.page = 1; load(false); return; }
    if (q.length < 2) return;
    searchTimer = setTimeout(() => { state.page = 1; load(false); }, 800);
  });

  // ── LOAD MORE ──
  document.getElementById("loadMoreBtn").addEventListener("click", () => {
    state.page++;
    load(true);
  });

  // ── INIT ──
  load(false);
</script>
</body>
</html>
